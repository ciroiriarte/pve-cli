name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags for the changelog drift check
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: gofmt
        run: test -z "$(gofmt -l . | grep -v '^vendor/')"
      - name: vet
        run: go vet -mod=vendor ./...
      - name: test
        run: go test -mod=vendor ./...
      - name: build
        run: go build -mod=vendor ./...
      - name: changelog drift
        run: |
          go run -mod=vendor ./cmd/genchangelog
          if [ -n "$(git status --porcelain packaging/obs/debian/changelog packaging/obs/pve-cli.changes)" ]; then
            echo "::error::OBS changelogs are stale — run 'make changelog' and commit"
            git --no-pager diff packaging/obs/debian/changelog packaging/obs/pve-cli.changes
            exit 1
          fi
